<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard — get a financial overview of your expenses in Expense Tracker." />
  <title>Dashboard — Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="app-page">

  <!-- ─── Navbar ──────────────────────────────────────────── -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="brand-icon-sm">💸</div>
      <span class="brand-name">Expense Tracker</span>
    </div>

    <nav class="navbar-nav">
      <a href="dashboard.html" class="nav-link active" id="nav-dashboard">
        <i data-feather="grid"></i> Dashboard
      </a>
      <a href="transactions.html" class="nav-link" id="nav-transactions">
        <i data-feather="list"></i> Transactions
      </a>
      <a href="categories.html" class="nav-link" id="nav-categories">
        <i data-feather="tag"></i> Categories
      </a>
    </nav>

    <div class="navbar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">Loading...</span>
      <button id="btn-logout" class="btn-icon btn-logout" title="Logout" onclick="logout()">
        <i data-feather="log-out"></i>
      </button>
    </div>
  </header>

  <!-- ─── Main Content ─────────────────────────────────────── -->
  <main class="app-main">

    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Overview</h1>
        <p class="page-subtitle">Financial summary for the selected month</p>
      </div>

      <!-- Month filter -->
      <div class="month-filter">
        <i data-feather="calendar"></i>
        <input
          id="month-picker"
          type="month"
          class="month-input"
          aria-label="Filter by month"
        />
      </div>
    </div>

    <!-- ─── Summary Cards ──────────────────────────────────── -->
    <section class="cards-grid" aria-label="Financial summary">

      <div class="summary-card card-income" id="card-income">
        <div class="card-icon-wrap income-icon">
          <i data-feather="trending-up"></i>
        </div>
        <div class="card-body">
          <span class="card-label">Total Income</span>
          <span class="card-value" id="val-income">$ —</span>
        </div>
        <div class="card-glow income-glow"></div>
      </div>

      <div class="summary-card card-expense" id="card-expense">
        <div class="card-icon-wrap expense-icon">
          <i data-feather="trending-down"></i>
        </div>
        <div class="card-body">
          <span class="card-label">Total Expenses</span>
          <span class="card-value" id="val-expense">$ —</span>
        </div>
        <div class="card-glow expense-glow"></div>
      </div>

      <div class="summary-card card-balance" id="card-balance">
        <div class="card-icon-wrap balance-icon">
          <i data-feather="dollar-sign"></i>
        </div>
        <div class="card-body">
          <span class="card-label">Period Balance</span>
          <span class="card-value" id="val-balance">$ —</span>
        </div>
        <div class="card-glow balance-glow"></div>
      </div>

    </section>

    <!-- ─── Charts Row ─────────────────────────────────────── -->
    <section class="charts-row">

      <!-- Pie chart -->
      <div class="chart-card" id="chart-card-pie">
        <div class="chart-card-header">
          <h2 class="chart-title">Expenses by Category</h2>
          <span class="chart-badge" id="pie-badge">Current month</span>
        </div>

        <div class="chart-canvas-wrap">
          <canvas id="chart-pie" aria-label="Expenses by category chart"></canvas>
          <div class="chart-empty" id="pie-empty" style="display:none">
            <i data-feather="pie-chart"></i>
            <p>No expenses in this period</p>
          </div>
        </div>

        <!-- Legend generated by JS -->
        <div class="chart-legend" id="pie-legend"></div>
      </div>

      <!-- Category breakdown table -->
      <div class="chart-card" id="chart-card-list">
        <div class="chart-card-header">
          <h2 class="chart-title">Breakdown</h2>
        </div>
        <div class="category-list" id="category-list">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
      </div>

    </section>

  </main>

  <script src="js/dashboard.js"></script>
  <script>feather.replace()</script>
</body>
</html>
