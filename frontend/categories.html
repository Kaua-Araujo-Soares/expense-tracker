<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Categories — manage your expense and income categories in Expense Tracker." />
  <title>Categories — Expense Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/transactions.css" />
  <link rel="stylesheet" href="css/categories.css" />
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body class="app-page">

  <!-- ─── Navbar ──────────────────────────────────────────── -->
  <header class="navbar">
    <div class="navbar-brand">
      <div class="brand-icon-sm">💸</div>
      <span class="brand-name">Expense Tracker</span>
    </div>

    <nav class="navbar-nav">
      <a href="dashboard.html" class="nav-link" id="nav-dashboard">
        <i data-feather="grid"></i> Dashboard
      </a>
      <a href="transactions.html" class="nav-link" id="nav-transactions">
        <i data-feather="list"></i> Transactions
      </a>
      <a href="categories.html" class="nav-link active" id="nav-categories">
        <i data-feather="tag"></i> Categories
      </a>
    </nav>

    <div class="navbar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name">Loading...</span>
      <button id="btn-logout" class="btn-icon btn-logout" title="Logout" onclick="logout()">
        <i data-feather="log-out"></i>
      </button>
    </div>
  </header>

  <!-- ─── Main ────────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <h1 class="page-title">Categories</h1>
        <p class="page-subtitle" id="cat-count">Loading...</p>
      </div>
      <button id="btn-new-cat" class="btn btn-primary btn-new" onclick="openModal()">
        <i data-feather="plus"></i>
        <span>New category</span>
      </button>
    </div>

    <!-- Page alert -->
    <div id="page-alert" class="alert alert-error" role="alert" style="margin-bottom:16px">
      <i data-feather="alert-circle"></i>
      <span id="page-alert-msg"></span>
    </div>
    <div id="page-success" class="alert alert-success" role="alert" style="margin-bottom:16px">
      <i data-feather="check-circle"></i>
      <span id="page-success-msg"></span>
    </div>

    <!-- ─── Categories Grid ─────────────────────────────── -->
    <div id="cat-grid" class="cat-grid">
      <!-- skeleton -->
      <div class="cat-card skeleton-card"></div>
      <div class="cat-card skeleton-card"></div>
      <div class="cat-card skeleton-card"></div>
      <div class="cat-card skeleton-card"></div>
    </div>

    <!-- Empty state -->
    <div id="cat-empty" class="empty-state" style="display:none">
      <i data-feather="tag"></i>
      <p>No categories yet</p>
      <button class="btn btn-primary btn-sm" onclick="openModal()">
        <i data-feather="plus"></i> Create your first category
      </button>
    </div>

  </main>

  <!-- ─── New Category Modal ──────────────────────────────── -->
  <div id="modal-overlay" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal modal-sm" id="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Category</h2>
        <button class="btn-icon modal-close" onclick="closeModal()" aria-label="Close">
          <i data-feather="x"></i>
        </button>
      </div>

      <div id="modal-alert" class="alert alert-error" role="alert">
        <i data-feather="alert-circle"></i>
        <span id="modal-alert-msg"></span>
      </div>

      <form id="modal-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="cat-name">Category name</label>
          <div class="input-wrapper">
            <input
              id="cat-name"
              class="form-input"
              type="text"
              placeholder="e.g. Food, Transport, Salary..."
              required
            />
            <i data-feather="tag" class="input-icon"></i>
          </div>
          <span class="form-error" id="err-cat-name">Please enter a category name.</span>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" id="btn-submit" class="btn btn-primary">
            <span class="spinner"></span>
            <span class="btn-text">Create</span>
          </button>
        </div>
      </form>

    </div>
  </div>

  <!-- ─── Confirm Delete Modal ─────────────────────────────── -->
  <div id="confirm-overlay" class="modal-overlay" onclick="handleConfirmOverlay(event)">
    <div class="modal modal-sm" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <div class="modal-header">
        <h2 class="modal-title" id="confirm-title">Delete category</h2>
        <button class="btn-icon modal-close" onclick="closeConfirm()" aria-label="Close">
          <i data-feather="x"></i>
        </button>
      </div>
      <p class="confirm-msg">
        Are you sure you want to delete <strong id="confirm-cat-name"></strong>?
        Transactions linked to this category will become uncategorized.
      </p>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        <button type="button" id="btn-confirm-delete" class="btn btn-danger">
          <span class="spinner"></span>
          <span class="btn-text">Delete</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/categories.js"></script>
  <script>feather.replace()</script>
</body>
</html>
